# cargo-deny configuration for cmdock-server.
#
# Policy goals:
# 1. Every dependency must be license-compatible with AGPL-3.0 (this crate).
# 2. Keep the door open for future commercial dual-licensing: reject strong
#    copyleft on deps we link statically (GPL/LGPL/AGPL upstream crates).
# 3. Fail CI on known-vulnerable, yanked, or unmaintained dependencies.
# 4. Fail CI on dependencies pulled from unknown registries or git hosts.
#
# Run locally:  cargo deny check
# Run in CI:    see .woodpecker/security.yml

[graph]
# Only check the targets we actually build for.
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ---------------------------------------------------------------------------
# Advisories — security and maintenance signal from RustSec DB
# ---------------------------------------------------------------------------
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

# ---------------------------------------------------------------------------
# Licenses — AGPL-compatible allowlist
# ---------------------------------------------------------------------------
[licenses]
# Confidence threshold for license detection (spdx-expression matching).
confidence-threshold = 0.93

# Permissive licenses we accept. These are AGPL-3.0 compatible *and* safe for
# future commercial dual-licensing because they impose no copyleft obligation
# on downstream distributions.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "Unlicense",
    # MPL-2.0 is weak-copyleft at the file level; acceptable because we do not
    # modify MPL-licensed upstream source. If we ever fork one, revisit this.
    "MPL-2.0",
    # This crate itself.
    "AGPL-3.0-or-later",
]

# Explicitly NOT allowed — listed here so a reviewer can see the intent:
#   GPL-2.0-only, GPL-3.0-only, LGPL-2.1, LGPL-3.0, AGPL-3.0 (from deps),
#   SSPL, BUSL, proprietary, CC-BY-NC-*.
# Anything not in `allow` fails by default.

# ---------------------------------------------------------------------------
# Bans — dependency hygiene
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# Crates we never want to pull in, with reason.
deny = [
    # Example: deny openssl in favour of rustls. Uncomment if we commit to that.
    # { crate = "openssl", reason = "Use rustls instead for pure-Rust TLS" },
]

# Crates where we explicitly tolerate multiple versions in the graph (usually
# transitive version skew we cannot control).
skip = []
skip-tree = []

# ---------------------------------------------------------------------------
# Sources — registry and git host allowlist
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
# No org-level git allowances yet. Add with justification if needed.
